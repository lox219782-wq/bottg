name: Run Telegram Bot  

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bot-instance
  cancel-in-progress: true

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p sessions uploads

      - name: Restore database (cache between runs)
        uses: actions/cache@v4
        with:
          path: bot.db
          key: bot-database-${{ github.run_id }}
          restore-keys: |
            bot-database-

      - name: Restore database from secret (first launch fallback)
        env:
          DB_B64: "${{ secrets.DB_B64 }}"
        run: |
          if [ ! -f bot.db ] && [ -n "$DB_B64" ]; then
            echo "$DB_B64" | base64 -d > bot.db
            echo "Database restored from DB_B64 secret"
          elif [ -f bot.db ]; then
            echo "Database restored from cache (accounts and sessions preserved)"
          else
            echo "Starting with fresh database"
          fi

      - name: Start bot
        env:
          BOT_TOKEN: "${{ secrets.BOT_TOKEN }}"
          ADMIN_IDS: "${{ secrets.ADMIN_IDS }}"
          API_ID: "${{ secrets.API_ID }}"
          API_HASH: "${{ secrets.API_HASH }}"
          DB_PATH: "bot.db"
          SESSIONS_DIR: "sessions"
          UPLOADS_DIR: "uploads"
        run: python main.py
