name: Run Telegram Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p sessions uploads

      - name: Restore sessions from secrets
        env:
          SESSIONS_B64: "${{ secrets.SESSIONS_B64 }}"
          DB_B64: "${{ secrets.DB_B64 }}"
        run: |
          if [ -n "$SESSIONS_B64" ]; then
            echo "$SESSIONS_B64" | base64 -d > sessions.tar.gz
            tar -xzf sessions.tar.gz -C sessions/ 2>/dev/null || true
            echo "Sessions restored"
          fi
          if [ -n "$DB_B64" ]; then
            echo "$DB_B64" | base64 -d > bot.db
            echo "Database restored"
          fi

      - name: Start bot
        env:
          BOT_TOKEN: "${{ secrets.BOT_TOKEN }}"
          ADMIN_IDS: "${{ secrets.ADMIN_IDS }}"
          API_ID: "${{ secrets.API_ID }}"
          API_HASH: "${{ secrets.API_HASH }}"
          DB_PATH: "bot.db"
          SESSIONS_DIR: "sessions"
          UPLOADS_DIR: "uploads"
        run: python main.py
