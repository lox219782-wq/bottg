jobs:
  bot:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
      DB_PATH: bot.db
      SESSIONS_DIR: sessions
      UPLOADS_DIR: uploads
    steps:
      - name: Checkout
        uses: actions/checkout@v4
-0
+6
        run: mkdir -p sessions uploads
      - name: Start bot
        env:
          BOT_TOKEN: "${{ secrets.BOT_TOKEN }}"
          ADMIN_IDS: "${{ secrets.ADMIN_IDS }}"
          DB_PATH: "bot.db"
          SESSIONS_DIR: "sessions"
          UPLOADS_DIR: "uploads"
        run: python main.py
